PACKAGE_NAME="mpro"
PACKAGE_VERSION="1.0.0"

BUILT_MODULE_NAME[0]="mpro"
DEST_MODULE_LOCATION[0]="/extra"

BUILT_MODULE_NAME[1]="mpro_drm"
BUILT_MODULE_LOCATION[1]="drm"
DEST_MODULE_LOCATION[1]="/extra"

BUILT_MODULE_NAME[2]="mpro_backlight"
BUILT_MODULE_LOCATION[2]="backlight"
DEST_MODULE_LOCATION[2]="/extra"

BUILT_MODULE_NAME[3]="mpro_touchscreen"
BUILT_MODULE_LOCATION[3]="touchscreen"
DEST_MODULE_LOCATION[3]="/extra"

MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

AUTOINSTALL="yes"
