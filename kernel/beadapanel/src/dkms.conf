# SPDX-License-Identifier: GPL-2.0-only
#
# DKMS configuration for the BeadaPanel Linux driver.
#
# The driver consists of three modules:
#   - beada_mfd:        USB / MFD parent
#   - beada_drm:        DRM / KMS child
#   - beada_backlight:  backlight class child (built from backlight/ subdir)
#
# All three are rebuilt and installed together; the parent module loads
# the children via the MFD subsystem at probe time.
 
PACKAGE_NAME="beada"
PACKAGE_VERSION="1.0"
 
# --- Module 0: MFD parent -------------------------------------------------
BUILT_MODULE_NAME[0]="beada_mfd"
DEST_MODULE_LOCATION[0]="/updates/dkms"
 
# --- Module 1: DRM child --------------------------------------------------
BUILT_MODULE_NAME[1]="beada_drm"
DEST_MODULE_LOCATION[1]="/updates/dkms"
 
# --- Module 2: backlight child (built in subdirectory) --------------------
#
# BUILT_MODULE_LOCATION tells DKMS where in the source tree the .ko file
# appears after `make`.  The Makefile recurses into backlight/ and builds
# beada_backlight.ko there.
BUILT_MODULE_NAME[2]="beada_backlight"
BUILT_MODULE_LOCATION[2]="backlight"
DEST_MODULE_LOCATION[2]="/updates/dkms"
 
# --- Build commands -------------------------------------------------------
#
# Standard out-of-tree kernel module build.  ${kernel_source_dir} resolves
# to /lib/modules/<kernelver>/build, which is the headers directory for the
# target kernel.  M= points kbuild at our source.
MAKE[0]="make KERNELRELEASE=${kernelver} -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make KERNELRELEASE=${kernelver} -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
 
# --- Behaviour ------------------------------------------------------------
#
# AUTOINSTALL=yes: rebuild and install automatically when a new kernel is
# installed.  Without this, the user has to run `dkms autoinstall` manually
# or the modules will be missing on the new kernel.
AUTOINSTALL="yes"
 
# REMAKE_INITRD=no: BeadaPanel is a USB display, not a boot-critical device.
# It doesn't need to be in the initramfs, so we skip the (slow) initramfs
# regeneration step.  If you use the panel for early boot output (e.g.
# Plymouth splash on the panel), change this to "yes".
REMAKE_INITRD="no"

